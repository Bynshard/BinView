name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run package:ci

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: binview-vsix-${{ github.sha }}
          path: dist/*.vsix
          if-no-files-found: error

      - name: Upload compiled output artifact
        uses: actions/upload-artifact@v4
        with:
          name: binview-out-${{ github.sha }}
          path: out/**
          if-no-files-found: error

      - name: Write rolling prerelease notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: |
          cat > dist/ci-release-notes.txt <<EOF
          Latest CI build for branch ${{ github.ref_name }}.

          Commit: ${{ github.sha }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Publish rolling prerelease
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.ref_name }}
          name: CI ${{ github.ref_name }}
          body_path: dist/ci-release-notes.txt
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: dist/binview.vsix
          overwrite_files: true
