name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run package:ci

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: binview-vsix-${{ github.sha }}
          path: dist/*.vsix
          if-no-files-found: error

      - name: Upload compiled output artifact
        uses: actions/upload-artifact@v4
        with:
          name: binview-out-${{ github.sha }}
          path: out/**
          if-no-files-found: error
